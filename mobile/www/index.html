<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#4f46e5">
  <title>Book Builder</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ── Settings Screen ──────────────────────────────────────────────────── -->
<div id="settingsScreen" class="screen hidden">
  <div class="top-bar">
    <button class="icon-btn" id="settingsBackBtn">←</button>
    <h1>Settings</h1>
    <div style="width:44px"></div>
  </div>
  <div class="screen-content">
    <div class="settings-group">
      <label>Server URL</label>
      <input type="url" id="serverUrlInput" placeholder="http://192.168.x.x:8000" autocapitalize="none" autocorrect="off">
      <p class="hint">Address of your BookBuilderBot server (e.g. your Mac on the same Wi-Fi)</p>
    </div>
    <div class="settings-group">
      <label>Anthropic API Key</label>
      <input type="password" id="anthropicKeyInput" placeholder="sk-ant-…" autocapitalize="none" autocorrect="off" autocomplete="off">
      <p class="hint">Used for story generation — get one at console.anthropic.com</p>
    </div>
    <div class="settings-group">
      <label>Gemini API Key</label>
      <input type="password" id="geminiKeyInput" placeholder="AIza…" autocapitalize="none" autocorrect="off" autocomplete="off">
      <p class="hint">Used for image generation — get one at aistudio.google.com</p>
    </div>
    <button class="btn-primary" id="saveSettingsBtn">Save Settings</button>
  </div>
</div>

<!-- ── Builder Screen ───────────────────────────────────────────────────── -->
<div id="builderScreen" class="screen">
  <div class="top-bar">
    <button class="icon-btn" id="backToSetupBtn" style="visibility:hidden">←</button>
    <h1 id="screenTitle">Book Builder</h1>
    <button class="icon-btn" id="settingsOpenBtn" title="Settings">⚙</button>
  </div>

  <!-- Step 1: Concept input -->
  <div id="setupView" class="view-content">
    <div class="lang-selector">
      <button class="lang-btn active" data-lang="zh">中文</button>
      <button class="lang-btn" data-lang="ja">日本語</button>
      <button class="lang-btn" data-lang="ko">한국어</button>
    </div>

    <textarea id="conceptInput" rows="4"
      placeholder="What's your story about?&#10;e.g. A little monkey who learns to share"></textarea>

    <details class="collapsible" id="styleDetails">
      <summary>Visual style (optional)</summary>
      <input type="text" id="styleInput"
        placeholder="e.g. watercolor illustration, soft pastel colors, children's book art">
    </details>

    <button class="btn-primary" id="decomposeBtn">✨ Generate Story</button>
  </div>

  <!-- Step 2: Story + page cards -->
  <div id="storyView" class="view-content hidden">
    <div id="bookTitleArea" class="book-title-area"></div>
    <div id="pagesContainer"></div>
    <div class="story-actions">
      <button class="btn-secondary" id="generateAllBtn">🎨 Generate All Images</button>
      <button class="btn-outline" id="exportBtn">📤 Export Book</button>
      <button class="btn-outline btn-danger" id="newBookBtn">✕ New Book</button>
    </div>
  </div>
</div>

<!-- ── Loading overlay ──────────────────────────────────────────────────── -->
<div id="loadingOverlay" class="loading-overlay hidden">
  <div class="spinner large"></div>
  <div id="loadingText" class="loading-text"></div>
</div>

<!-- ── Toast ────────────────────────────────────────────────────────────── -->
<div id="toast" class="toast hidden"></div>

<script src="app.js"></script>
</body>
</html>
