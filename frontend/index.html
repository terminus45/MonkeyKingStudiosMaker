<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MonkeyKing Story Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-title">
        <span class="title-zh">齐天大圣</span>
        <span class="title-en">MonkeyKing Story Studio</span>
      </div>
      <nav class="header-nav">
        <a href="index.html" class="nav-link active">Image Studio</a>
        <a href="book_builder.html" class="nav-link">Book Builder</a>
        <a href="gallery.html" class="nav-link">Gallery</a>
      </nav>
      <div class="server-status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusLabel">Connecting…</span>
      </div>
    </div>
  </header>

  <main>

    <!-- ── LEFT: Controls ── -->
    <aside class="controls">

      <section class="control-group">
        <label>Scene Prompt</label>
        <textarea id="prompt" rows="4" placeholder="Describe the scene…"></textarea>
      </section>

      <section class="control-group">
        <label>Style Prompt</label>
        <textarea id="stylePrompt" rows="3" placeholder="Describe the visual style…"></textarea>
        <div class="presets" id="stylePresets" style="margin-top:.4rem">
          <button class="preset" data-suffix="Black and white ink line art, manga linework, chibi storybook illustration, white background, no color">Ink &amp; Manga</button>
          <button class="preset" data-suffix="Traditional Chinese ink painting, brush strokes, Sumi-e style, monochrome">Sumi-e</button>
          <button class="preset" data-suffix="Vibrant cinematic illustration, detailed painterly, storybook art, rich colors">Cinematic</button>
          <button class="preset" data-suffix="Soft watercolor illustration, children's book art, delicate washes, pastel tones">Watercolor</button>
          <button class="preset" data-suffix="">Clear</button>
        </div>
      </section>

      <section class="control-group">
        <label class="toggle-label" id="negToggle">
          Negative Prompt <span class="toggle-arrow">▸</span>
        </label>
        <textarea id="negPrompt" rows="3" class="collapsed"
          placeholder="blurry, low quality, watermark…">blurry, low quality, watermark, text, deformed, ugly, bad anatomy</textarea>
      </section>

      <section class="control-group">
        <label>Model</label>
        <div class="refresh-row">
          <select id="modelSelect" style="flex:1">
            <option value="">Loading…</option>
          </select>
          <button id="refreshBtn" class="refresh-btn" title="Rescan models &amp; LoRAs">↺</button>
        </div>
      </section>

      <section class="control-group">
        <label>LoRA 1</label>
        <select id="loraSelect"><option value="">— none —</option></select>
        <div class="slider-row" id="loraScaleRow" style="display:none;margin-top:.4rem">
          <label>Weight <span id="loraScaleVal">1.00</span></label>
          <input type="range" id="loraScale" min="0" max="2" step="0.05" value="1.0">
        </div>
      </section>

      <section class="control-group">
        <label>LoRA 2</label>
        <select id="loraSelect2"><option value="">— none —</option></select>
        <div class="slider-row" id="loraScaleRow2" style="display:none;margin-top:.4rem">
          <label>Weight <span id="loraScaleVal2">1.00</span></label>
          <input type="range" id="loraScale2" min="0" max="2" step="0.05" value="1.0">
        </div>
      </section>

      <section class="control-group">
        <label>Canvas Size</label>
        <div class="presets" id="sizePresets">
          <button class="preset size-btn" data-w="1024" data-h="576">16:9</button>
          <button class="preset size-btn" data-w="912" data-h="608">3:2</button>
          <button class="preset size-btn" data-w="768" data-h="768">1:1</button>
          <button class="preset size-btn" data-w="576" data-h="1024">Portrait</button>
          <button class="preset size-btn active" data-w="512" data-h="512">512²</button>
        </div>
        <div class="size-dims-row">
          <input type="number" id="widthInput"  value="512" min="64" max="2048" step="8">
          <span class="size-dims-x">×</span>
          <input type="number" id="heightInput" value="512" min="64" max="2048" step="8">
          <span class="size-dims-px">px</span>
        </div>
      </section>

      <section class="control-group sliders">
        <div class="slider-row">
          <label>Steps <span id="stepsVal">30</span></label>
          <input type="range" id="steps" min="10" max="80" value="30">
        </div>
        <div class="slider-row">
          <label>Guidance <span id="cfgVal">8.5</span></label>
          <input type="range" id="cfg" min="1" max="20" step="0.5" value="8.5">
        </div>
      </section>

      <section class="control-group">
        <label>Sampler</label>
        <select id="samplerSelect">
          <option value="dpm++2m">DPM++ 2M</option>
          <option value="euler_a">Euler A</option>
          <option value="euler">Euler</option>
          <option value="ddim">DDIM</option>
          <option value="heun">Heun</option>
          <option value="dpm++_sde">DPM++ SDE</option>
          <option value="unipc">UniPC</option>
          <option value="lms">LMS</option>
        </select>
      </section>

      <section class="control-group">
        <label>Clip Skip</label>
        <select id="clipSkipSelect">
          <option value="1">1</option>
          <option value="2" selected>2</option>
          <option value="3">3</option>
          <option value="4">4</option>
        </select>
      </section>

      <section class="control-group">
        <label>Seed <span class="hint">(−1 = random)</span></label>
        <div class="seed-row">
          <input type="number" id="seed" value="-1" min="-1">
          <button id="randSeed" title="Randomise">⚄</button>
        </div>
      </section>

      <div class="settings-row">
        <button id="saveSettingsBtn" class="settings-btn" title="Export settings to a JSON file">↓ Save Settings</button>
        <label class="settings-btn" title="Import settings from a JSON file">
          ↑ Load Settings
          <input type="file" id="loadSettingsFile" accept=".json" style="display:none">
        </label>
        <button id="resetSettingsBtn" class="settings-btn settings-btn--muted" title="Clear saved settings and reset to defaults">Reset</button>
      </div>

      <button id="generateBtn" class="generate-btn">
        <span id="generateLabel">Generate</span>
        <div class="spinner hidden" id="spinner"></div>
      </button>

    </aside>

    <!-- ── RIGHT: Canvas + Gallery ── -->
    <section class="canvas-area">

      <div class="output-frame" id="outputFrame">
        <div class="placeholder" id="placeholder">
          <div class="placeholder-icon">🐵</div>
          <p>Your illustration will appear here</p>
        </div>
        <img id="outputImg" class="hidden" alt="Generated illustration">
        <div class="gen-progress hidden" id="genProgress">
          <div class="gen-progress-track">
            <div class="gen-progress-fill" id="genProgressBar"></div>
          </div>
          <span class="gen-progress-label" id="genProgressLabel">0 / 0</span>
        </div>
      </div>

      <div class="output-meta hidden" id="outputMeta">
        <span id="metaSeed"></span>
        <span id="metaModel"></span>
        <span id="metaSize"></span>
        <div class="meta-actions">
          <button id="downloadBtn">↓ Download</button>
          <button id="reuseBtn">↺ Reuse Seed</button>
        </div>
      </div>

      <div class="gallery-section">
        <h3>History</h3>
        <div class="gallery" id="gallery">
          <p class="gallery-empty">No images yet this session.</p>
        </div>
      </div>

    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
